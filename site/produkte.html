<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Produkte — HOFER Landesprodukte</title>

<link rel="icon" href="assets/mark.svg">
<link rel="stylesheet" href="css/styles.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js" defer></script>

<body data-page="produkte">

<div id="site-header"></div>

<main class="container page-main">
  <nav class="breadcrumbs" aria-label="Brotkrümelnavigation">
    <ol>
      <li><a href="index.html">Start</a><i data-lucide="chevron-right"></i></li>
      <li><span aria-current="page">Produkte</span></li>
    </ol>
  </nav>

  <div class="page-intro">
    <span class="overline">Sortiment · 25+ Kategorien</span>

    <button class="chip is-active" role="tab" aria-selected="true" data-filter="alle">Alle</button>

    <button class="chip" role="tab" aria-selected="false" data-filter="sonstiges"><i data-lucide="package"></i>Sonstiges</button>

<div id="site-footer"></div>
